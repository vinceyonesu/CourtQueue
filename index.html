<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CourtQueue 🎾</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.22.9/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f4f4f4; min-height: 100vh; }
    button { cursor: pointer; border: none; border-radius: 6px; padding: 6px 14px; font-size: 13px; color: white; }
    input, select { padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
    @keyframes slideIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    .notif { animation: slideIn 0.3s ease; }
    .warning-pulse { animation: pulse 1s infinite; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;
    const DEFAULT_AVG = 30;
    const MAX_PLAY_MINUTES = 60;

    function formatWait(mins) {
      if (mins === 0) return "You are next!";
      if (mins < 60) return `~${mins} min wait`;
      const h = Math.floor(mins / 60);
      const m = mins % 60;
      return m === 0 ? `~${h} hr wait` : `~${h} hr ${m} min wait`;
    }

    function formatTime(date) {
      return new Date(date).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
    }

    function NotificationBanner({ notifications }) {
      if (notifications.length === 0) return null;
      return (
        <div style={{position:"fixed",top:"20px",right:"20px",zIndex:999,display:"flex",flexDirection:"column",gap:"8px"}}>
          {notifications.map(n => (
            <div key={n.id} className="notif" style={{
              background:n.type==="success"?"#1D9E75":n.type==="error"?"#e74c3c":"#e67e22",
              color:"white",padding:"12px 18px",borderRadius:"8px",
              fontSize:"14px",fontWeight:"500",boxShadow:"0 4px 12px rgba(0,0,0,0.15)",
              maxWidth:"280px"
            }}>{n.message}</div>
          ))}
        </div>
      );
    }

    function Timer({ onEnd, onOvertime }) {
      const [secs, setSecs] = useState(0);
      const [running, setRunning] = useState(false);
      const [overtime, setOvertime] = useState(false);
      useEffect(() => {
        let t = null;
        if (running) t = setInterval(() => setSecs(s => s + 1), 1000);
        return () => clearInterval(t);
      }, [running]);
      useEffect(() => {
        const mins = Math.floor(secs / 60);
        if (mins >= MAX_PLAY_MINUTES && !overtime) {
          setOvertime(true);
          if (onOvertime) onOvertime();
        }
      }, [secs]);
      const fmt = (s) => `${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
      const mins = Math.floor(secs / 60);
      const isWarning = mins >= MAX_PLAY_MINUTES - 5;
      const isOvertime = mins >= MAX_PLAY_MINUTES;
      return (
        <div style={{marginTop:"8px"}}>
          {isOvertime&&<div className="warning-pulse" style={{background:"#e74c3c",color:"white",padding:"6px 12px",borderRadius:"6px",fontSize:"12px",fontWeight:"500",marginBottom:"8px",display:"inline-block"}}>⚠️ Time is up! Please wrap up your session.</div>}
          {isWarning&&!isOvertime&&<div style={{background:"#fff3cd",color:"#856404",padding:"6px 12px",borderRadius:"6px",fontSize:"12px",fontWeight:"500",marginBottom:"8px",display:"inline-block"}}>⏰ 5 minutes remaining!</div>}
          <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
            <span style={{fontSize:"22px",fontWeight:"bold",color:isOvertime?"#e74c3c":isWarning?"#e67e22":running?"#1D9E75":"#333"}}>{fmt(secs)}</span>
            {!running?<button style={{background:"#1D9E75"}} onClick={()=>setRunning(true)}>Start</button>
              :<button style={{background:"#e67e22"}} onClick={()=>setRunning(false)}>Pause</button>}
            <button style={{background:"#e74c3c"}} onClick={()=>{setRunning(false);onEnd(Math.max(1,Math.round(secs/60)));setSecs(0);setOvertime(false);}}>End Session</button>
          </div>
        </div>
      );
    }

    // NEW: Stats Bar Component
    function StatsBar({ queue, history }) {
      const waiting = queue.filter(p=>p.status==="waiting").length;
      const playing = queue.filter(p=>p.status==="playing").length;
      const completed = history.length;
      const totalMins = history.reduce((s,h)=>s+h.duration,0);
      const avgMins = completed===0?0:Math.round(totalMins/completed);

      const stats = [
        { label:"Waiting", value:waiting, color:"#e67e22", bg:"#fff3cd" },
        { label:"Playing", value:playing, color:"#1D9E75", bg:"#f0fdf8" },
        { label:"Completed Today", value:completed, color:"#185FA5", bg:"#E6F1FB" },
        { label:"Avg Session", value:avgMins===0?"—":`${avgMins}m`, color:"#534AB7", bg:"#EEEDFE" },
      ];

      return (
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"12px",marginBottom:"24px"}}>
          {stats.map(s=>(
            <div key={s.label} style={{background:"white",borderRadius:"10px",padding:"16px",border:"1px solid #ddd",textAlign:"center"}}>
              <div style={{fontSize:"28px",fontWeight:"bold",color:s.color}}>{s.value}</div>
              <div style={{fontSize:"12px",color:"#888",marginTop:"4px"}}>{s.label}</div>
            </div>
          ))}
        </div>
      );
    }

    function AdminPanel({ queue, courts, onRemovePlayer, onResetCourt, onClearQueue }) {
      const [open, setOpen] = useState(false);
      return (
        <div style={{background:"white",borderRadius:"10px",padding:"20px",marginBottom:"24px",border:"1px solid #e74c3c"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <h3>🔧 Admin Controls</h3>
            <button style={{background:open?"#e74c3c":"#888"}} onClick={()=>setOpen(!open)}>{open?"Hide":"Show"} Controls</button>
          </div>
          {open&&(
            <div style={{marginTop:"16px"}}>
              <div style={{marginBottom:"16px"}}>
                <h4 style={{marginBottom:"8px",color:"#555"}}>Reset Courts</h4>
                <div style={{display:"flex",gap:"8px",flexWrap:"wrap"}}>
                  {courts.map(c=>(
                    <button key={c.id} style={{background:c.status==="occupied"?"#e74c3c":"#aaa"}} onClick={()=>onResetCourt(c.id)}>Reset {c.name}</button>
                  ))}
                </div>
              </div>
              <div style={{marginBottom:"16px"}}>
                <h4 style={{marginBottom:"8px",color:"#555"}}>Remove Players</h4>
                {queue.length===0?<p style={{color:"#aaa",fontSize:"13px"}}>No players in queue</p>:(
                  <div style={{display:"flex",flexDirection:"column",gap:"6px"}}>
                    {queue.map(p=>(
                      <div key={p.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 12px",background:"#fafafa",borderRadius:"6px",border:"1px solid #eee"}}>
                        <span style={{fontSize:"13px"}}><strong>{p.name}</strong><span style={{color:"#888",marginLeft:"8px"}}>{p.court}</span></span>
                        <button style={{background:"#e74c3c",fontSize:"12px",padding:"4px 10px"}} onClick={()=>onRemovePlayer(p.id)}>Remove</button>
                      </div>
                    ))}
                  </div>
                )}
              </div>
              <button style={{background:"#e74c3c",width:"100%",padding:"10px"}} onClick={onClearQueue}>🗑 Clear Entire Queue</button>
            </div>
          )}
        </div>
      );
    }

    function CourtQueueTab({ courtName, players, avg, onStart, onLeave, onEnd, onOvertime }) {
      const courtPlayers = players.filter(p=>p.court===courtName);
      return (
        <div>
          {courtPlayers.length===0?(
            <p style={{color:"#aaa",textAlign:"center",padding:"20px 0",fontSize:"13px"}}>No players in {courtName} queue</p>
          ):courtPlayers.map((player,idx)=>(
            <div key={player.id} style={{display:"flex",alignItems:"flex-start",gap:"14px",padding:"14px",marginBottom:"10px",borderRadius:"8px",background:player.status==="playing"?"#f0fdf8":"#fafafa",border:`1px solid ${player.status==="playing"?"#1D9E75":"#eee"}`}}>
              <div style={{width:"36px",height:"36px",borderRadius:"50%",flexShrink:0,background:player.status==="playing"?"#1D9E75":"#ddd",color:player.status==="playing"?"white":"#555",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:"bold",fontSize:"16px"}}>{idx+1}</div>
              <div style={{flex:1}}>
                <div style={{display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap"}}>
                  <strong>{player.name}</strong>
                  <span style={{fontSize:"12px",padding:"2px 8px",borderRadius:"20px",background:player.status==="playing"?"#1D9E75":"#eee",color:player.status==="playing"?"white":"#555"}}>{player.status==="playing"?"Playing":"Waiting"}</span>
                  {idx===0&&player.status==="waiting"&&<span style={{fontSize:"12px",padding:"2px 8px",borderRadius:"20px",background:"#fff3cd",color:"#856404",fontWeight:"500"}}>🎾 You're next!</span>}
                </div>
                {player.status==="waiting"&&<div style={{fontSize:"13px",color:"#888",marginTop:"4px"}}>⏳ {formatWait(idx*avg)}</div>}
                {player.status==="playing"&&<Timer onEnd={(d)=>onEnd(player.id,d)} onOvertime={()=>onOvertime(player)} />}
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:"6px"}}>
                {player.status==="waiting"&&<button style={{background:"#1D9E75"}} onClick={()=>onStart(player.id)}>Start Playing</button>}
                <button style={{background:"#e74c3c"}} onClick={()=>onLeave(player.id)}>Leave</button>
              </div>
            </div>
          ))}
        </div>
      );
    }

    function HistoryLog({ history }) {
      if (history.length===0) return null;
      return (
        <div style={{background:"white",borderRadius:"10px",padding:"20px",marginTop:"24px",border:"1px solid #ddd"}}>
          <h3 style={{marginBottom:"14px"}}>📋 Session History</h3>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:"13px"}}>
            <thead>
              <tr style={{borderBottom:"2px solid #eee"}}>
                <th style={{textAlign:"left",padding:"8px",color:"#888",fontWeight:"500"}}>#</th>
                <th style={{textAlign:"left",padding:"8px",color:"#888",fontWeight:"500"}}>Player</th>
                <th style={{textAlign:"left",padding:"8px",color:"#888",fontWeight:"500"}}>Court</th>
                <th style={{textAlign:"left",padding:"8px",color:"#888",fontWeight:"500"}}>Duration</th>
                <th style={{textAlign:"left",padding:"8px",color:"#888",fontWeight:"500"}}>Ended</th>
              </tr>
            </thead>
            <tbody>
              {[...history].reverse().map((h,i)=>(
                <tr key={h.id} style={{borderBottom:"1px solid #f0f0f0"}}>
                  <td style={{padding:"8px",color:"#aaa"}}>{history.length-i}</td>
                  <td style={{padding:"8px",fontWeight:"500"}}>{h.playerName}</td>
                  <td style={{padding:"8px",color:"#888"}}>{h.court}</td>
                  <td style={{padding:"8px"}}><span style={{background:h.duration>=MAX_PLAY_MINUTES?"#fff0f0":"#f0fdf8",color:h.duration>=MAX_PLAY_MINUTES?"#e74c3c":"#1D9E75",padding:"2px 8px",borderRadius:"20px",fontWeight:"500"}}>{h.duration} min {h.duration>=MAX_PLAY_MINUTES&&"⚠️"}</span></td>
                  <td style={{padding:"8px",color:"#aaa"}}>{formatTime(h.endedAt)}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    function App() {
      const [queue, setQueue] = useState([]);
      const [sessions, setSessions] = useState([]);
      const [history, setHistory] = useState([]);
      const [name, setName] = useState("");
      const [court, setCourt] = useState("Court 1");
      const [error, setError] = useState("");
      const [notifications, setNotifications] = useState([]);
      const [activeTab, setActiveTab] = useState("All");
      const [courts, setCourts] = useState([
        {id:1,name:"Court 1",status:"available",currentPlayer:null},
        {id:2,name:"Court 2",status:"available",currentPlayer:null},
        {id:3,name:"Court 3",status:"available",currentPlayer:null},
      ]);

      const avg = sessions.length===0?DEFAULT_AVG:Math.round(sessions.slice(-5).reduce((s,x)=>s+x,0)/Math.min(sessions.length,5));

      const addNotification = (message, type="success") => {
        const id = Date.now();
        setNotifications(n=>[...n,{id,message,type}]);
        setTimeout(()=>setNotifications(n=>n.filter(x=>x.id!==id)),4000);
      };

      const join = () => {
        if (!name.trim()) { setError("Please enter your name"); return; }
        const position = queue.length+1;
        setQueue(q=>[...q,{id:Date.now(),name:name.trim(),court,position,status:"waiting"}]);
        addNotification(`✅ ${name.trim()} joined ${court} at position ${position}`);
        setName(""); setError("");
      };

      const leave = (id) => {
        const player = queue.find(p=>p.id===id);
        if (player?.status==="playing")
          setCourts(cs=>cs.map(c=>c.name===player.court?{...c,status:"available",currentPlayer:null}:c));
        const newQueue = queue.filter(p=>p.id!==id).map((p,i)=>({...p,position:i+1}));
        setQueue(newQueue);
        if (newQueue.length>0&&newQueue[0].status==="waiting")
          addNotification(`🎾 ${newQueue[0].name} — you are next!`,"warning");
      };

      const setStatus = (id, status) => {
        const player = queue.find(p=>p.id===id);
        if (status==="playing"&&player) {
          setCourts(cs=>cs.map(c=>c.name===player.court?{...c,status:"occupied",currentPlayer:player.name}:c));
          addNotification(`🎾 ${player.name} started playing on ${player.court}!`);
        }
        setQueue(q=>q.map(p=>p.id===id?{...p,status}:p));
      };

      const endSession = (id, duration) => {
        const player = queue.find(p=>p.id===id);
        if (player) {
          setCourts(cs=>cs.map(c=>c.name===player.court?{...c,status:"available",currentPlayer:null}:c));
          addNotification(`✅ ${player.name} finished — session was ${duration} min`);
          setHistory(h=>[...h,{id:Date.now(),playerName:player.name,court:player.court,duration,endedAt:new Date()}]);
        }
        setSessions(s=>[...s,duration]);
        const newQueue = queue.filter(p=>p.id!==id).map((p,i)=>({...p,position:i+1}));
        setQueue(newQueue);
        if (newQueue.length>0&&newQueue[0].status==="waiting")
          setTimeout(()=>addNotification(`🎾 ${newQueue[0].name} — you are next!`,"warning"),500);
      };

      const handleResetCourt = (courtId) => {
        const c = courts.find(x=>x.id===courtId);
        if (c?.currentPlayer) {
          const player = queue.find(p=>p.name===c.currentPlayer);
          if (player) leave(player.id);
        }
        setCourts(cs=>cs.map(c=>c.id===courtId?{...c,status:"available",currentPlayer:null}:c));
        addNotification(`🔧 ${c?.name} has been reset`,"warning");
      };

      const handleClearQueue = () => {
        setQueue([]);
        setCourts(cs=>cs.map(c=>({...c,status:"available",currentPlayer:null})));
        addNotification(`🗑 Queue cleared by admin`,"error");
      };

      const tabs = ["All","Court 1","Court 2","Court 3"];

      return (
        <div>
          <NotificationBanner notifications={notifications} />
          <div style={{background:"#1D9E75",padding:"14px 30px",display:"flex",alignItems:"center",gap:"10px"}}>
            <span style={{fontSize:"22px"}}>🎾</span>
            <span style={{color:"white",fontSize:"20px",fontWeight:"bold"}}>CourtQueue</span>
            <span style={{color:"#cfffec",fontSize:"13px",marginLeft:"8px"}}>Tennis & Pickleball Queue Manager</span>
          </div>
          <div style={{maxWidth:"700px",margin:"30px auto",padding:"0 20px"}}>

            {/* Stats Bar */}
            <StatsBar queue={queue} history={history} />

            {/* Court Status */}
            <div style={{display:"flex",gap:"12px",flexWrap:"wrap",marginBottom:"24px"}}>
              {courts.map(c=>(
                <div key={c.id} style={{flex:"1",minWidth:"140px",padding:"14px",borderRadius:"8px",textAlign:"center",background:c.status==="occupied"?"#fff0f0":"#f0fdf8",border:`1px solid ${c.status==="occupied"?"#e74c3c":"#1D9E75"}`}}>
                  <div style={{fontSize:"22px",marginBottom:"6px"}}>{c.status==="occupied"?"🔴":"🟢"}</div>
                  <div style={{fontWeight:"bold",fontSize:"15px"}}>{c.name}</div>
                  <div style={{fontSize:"12px",marginTop:"4px",fontWeight:"500",color:c.status==="occupied"?"#e74c3c":"#1D9E75"}}>{c.status==="occupied"?"Occupied":"Available"}</div>
                  {c.currentPlayer&&<div style={{fontSize:"12px",color:"#888",marginTop:"4px"}}>{c.currentPlayer}</div>}
                  <div style={{fontSize:"12px",color:"#888",marginTop:"4px"}}>{queue.filter(p=>p.court===c.name&&p.status==="waiting").length} waiting</div>
                </div>
              ))}
            </div>

            <AdminPanel queue={queue} courts={courts} onRemovePlayer={leave} onResetCourt={handleResetCourt} onClearQueue={handleClearQueue} />

            <div style={{background:"white",borderRadius:"10px",padding:"20px",marginBottom:"24px",border:"1px solid #ddd"}}>
              <h3 style={{marginBottom:"14px"}}>Join the Queue</h3>
              {error&&<p style={{color:"red",fontSize:"13px",marginBottom:"8px"}}>{error}</p>}
              <div style={{display:"flex",gap:"10px",flexWrap:"wrap"}}>
                <input type="text" placeholder="Your name" value={name}
                  onChange={e=>setName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&join()}
                  style={{flex:1,minWidth:"150px"}} />
                <select value={court} onChange={e=>setCourt(e.target.value)}>
                  <option>Court 1</option><option>Court 2</option><option>Court 3</option>
                </select>
                <button style={{background:"#1D9E75"}} onClick={join}>Join Queue</button>
              </div>
            </div>

            <div style={{background:"white",borderRadius:"10px",padding:"20px",border:"1px solid #ddd"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"16px"}}>
                <h3>Live Queue</h3>
                <span style={{fontSize:"13px",color:"#888"}}>Avg: {avg} min · {queue.length} in queue</span>
              </div>
              <div style={{display:"flex",gap:"8px",marginBottom:"16px",borderBottom:"1px solid #eee",paddingBottom:"12px"}}>
                {tabs.map(tab=>(
                  <button key={tab} style={{background:activeTab===tab?"#1D9E75":"#f0f0f0",color:activeTab===tab?"white":"#555",fontSize:"13px",padding:"6px 14px"}} onClick={()=>setActiveTab(tab)}>
                    {tab}
                    <span style={{marginLeft:"6px",fontSize:"11px",background:activeTab===tab?"rgba(255,255,255,0.3)":"#ddd",padding:"1px 6px",borderRadius:"10px"}}>
                      {tab==="All"?queue.length:queue.filter(p=>p.court===tab).length}
                    </span>
                  </button>
                ))}
              </div>
              {activeTab==="All"?(
                queue.length===0?(
                  <p style={{color:"#aaa",textAlign:"center",padding:"30px 0"}}>No players in queue yet. Be the first to join! 🎾</p>
                ):queue.map(player=>(
                  <div key={player.id} style={{display:"flex",alignItems:"flex-start",gap:"14px",padding:"14px",marginBottom:"10px",borderRadius:"8px",background:player.status==="playing"?"#f0fdf8":"#fafafa",border:`1px solid ${player.status==="playing"?"#1D9E75":"#eee"}`}}>
                    <div style={{width:"36px",height:"36px",borderRadius:"50%",flexShrink:0,background:player.status==="playing"?"#1D9E75":"#ddd",color:player.status==="playing"?"white":"#555",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:"bold",fontSize:"16px"}}>{player.position}</div>
                    <div style={{flex:1}}>
                      <div style={{display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap"}}>
                        <strong>{player.name}</strong>
                        <span style={{fontSize:"13px",color:"#888"}}>{player.court}</span>
                        <span style={{fontSize:"12px",padding:"2px 8px",borderRadius:"20px",background:player.status==="playing"?"#1D9E75":"#eee",color:player.status==="playing"?"white":"#555"}}>{player.status==="playing"?"Playing":"Waiting"}</span>
                        {player.position===1&&player.status==="waiting"&&<span style={{fontSize:"12px",padding:"2px 8px",borderRadius:"20px",background:"#fff3cd",color:"#856404",fontWeight:"500"}}>🎾 You're next!</span>}
                      </div>
                      {player.status==="waiting"&&<div style={{fontSize:"13px",color:"#888",marginTop:"4px"}}>⏳ {formatWait((player.position-1)*avg)}</div>}
                      {player.status==="playing"&&<Timer onEnd={(d)=>endSession(player.id,d)} onOvertime={()=>addNotification(`⚠️ ${player.name}'s time is up!`,"error")} />}
                    </div>
                    <div style={{display:"flex",flexDirection:"column",gap:"6px"}}>
                      {player.status==="waiting"&&<button style={{background:"#1D9E75"}} onClick={()=>setStatus(player.id,"playing")}>Start Playing</button>}
                      <button style={{background:"#e74c3c"}} onClick={()=>leave(player.id)}>Leave</button>
                    </div>
                  </div>
                ))
              ):(
                <CourtQueueTab courtName={activeTab} players={queue} avg={avg}
                  onStart={(id)=>setStatus(id,"playing")} onLeave={leave} onEnd={endSession}
                  onOvertime={(p)=>addNotification(`⚠️ ${p.name}'s time is up!`,"error")} />
              )}
            </div>
            <HistoryLog history={history} />
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
